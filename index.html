<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Commit Chambeador</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>

    <header class="encabezado">
        
        <div class="contenedor-marca">
            <img src="imagenes/Logo.jpeg" alt="Logo de Commit Chambeador" class="logo">
            <h1>Commit Chambeador</h1>
        </div>

    </header>

<main class="combosAndPromotions-section">
        <section class="products-section">
            <h2>Combos y promos</h2>

            <div class="products-grid">

                <article class="product-card">
                    <img src="imagenes/PromocionMilkshake.jpg" alt="Promo">

                    <div class="product-info">
                        <h3>Promo Milkshake 2x1</h3>
                        <p>2 milkshake por 25 Bs</p>
                        <span class="price">Bs. 25.00</span>
                        <button>Agregar al carrito</button>
                    </div>
                </article>

                <article class="product-card">
    <img src="imagenes/promoDrinkBerries.jpg" alt="Descuento 10% Drink Berries">

    <div class="product-info">
      <h3>Descuento 10% Drink Berries</h3>
      <p>Drink Berries</p>
      <span class="price">Bs. 18.00</span>
      <button>Agregar al carrito</button>
    </div>
  </article>

</div>

            </div>
        </section>
    </main>

</body>
</html>
